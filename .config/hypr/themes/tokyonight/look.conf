general {
    gaps_in = 4
    gaps_out = 4
    border_size = 2

    col.active_border = rgba(565f89aa)
    col.inactive_border = rgba(565f89aa)

    resize_on_border = true 
    allow_tearing = true
    layout = dwindle
}

decoration {
    rounding = 7
    rounding_power = 3

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
      enabled = true
      range = 3
      render_power = 3
      color = rgba(565f89ee)
    }

    blur {
      enabled = true 
      size = 8
      passes = 3

      new_optimizations = true
      noise = 0.09
      brightness = 1.0
      contrast = 1.3
      vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)
                              #X0     #Y0     #X1     #Y1
    bezier = easeOutQuint,    0.16,   1,      0.3,    1
    bezier = easeInOutCubic,  0.65,   0.05,   0.36,   1
    bezier = linear,          0,      0,      1,      1
    bezier = almostLinear,    0.5,    0.5,    0.75,   1
    bezier = layerAnim,       0.25,   -0.23,  0.75,   1.14
    bezier = elastic,         0.87,   0,      0.13,   1
    bezier = quick,           0.15,   0,      0.1,    1

    
    animation = global,        1,     10,     default
    animation = border,        1,     5.39,   easeOutQuint
    animation = windows,       1,     4.79,   easeOutQuint
    animation = windowsIn,     1,     4.1,    easeOutQuint, popin 77%
    animation = windowsOut,    1,     1.49,   easeOutQuint, popin 87%

    animation = fadeIn,        1,     1.73,   almostLinear
    animation = fadeOut,       1,     1.46,   almostLinear
    animation = fade,          1,     3.03,   quick

    animation = layers,        1,     3.81,   layerAnim
    animation = layersIn,      1,     4,      layerAnim, fade
    animation = layersOut,     1,     1.5,    linear,       fade
    animation = fadeLayersIn,  1,     1.79,   almostLinear
    animation = fadeLayersOut, 1,     1.39,   almostLinear

    animation = workspaces,    1,     1.96,   elastic, slide
    animation = workspacesIn,  1,     1.98,   elastic, slide
    animation = workspacesOut, 1,     1.96,   elastic, slide
    animation = zoomFactor,    1,     7,      quick
}

dwindle {
    pseudotile = true
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

